<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Tracking Dashboard</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        height: 100vh;
        font-family: Arial, sans-serif;
    }

    .container {
        display: flex;
        width: 100%;
        height: 100vh;
    }

    .panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #ccc;
    }

    .panel:last-child {
        border-right: none;
    }

    .title {
        padding: 12px;
        background: #1f2937;
        color: white;
        text-align: center;
        font-weight: bold;
    }

    iframe {
        flex: 1;
        width: 100%;
        border: none;
    }
</style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="title">Kumari (CFG4292)</div>
        <iframe
            src="https://uk.flightaware.com/live/flight/CFG4292"
            loading="lazy">
        </iframe>
    </div>

    <div class="panel">
        <div class="title">Hemanth (ICE549)</div>
        <iframe
            src="https://www.flightaware.com/live/flight/ICE549"
            loading="lazy">
        </iframe>
    </div>
</div>

</body>
</html>
