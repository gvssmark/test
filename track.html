<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Dashboard</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
    }

    .sidebar {
        width: 250px;
        background: #1f2937;
        color: white;
        padding: 20px;
    }

    .sidebar h2 {
        margin-top: 0;
    }

    .flight-link {
        display: block;
        padding: 12px;
        margin-bottom: 10px;
        background: #374151;
        color: white;
        text-decoration: none;
        border-radius: 6px;
    }

    .flight-link:hover {
        background: #4b5563;
    }

    .content {
        flex: 1;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }
</style>

<script>
function loadFlight(url) {
    document.getElementById("flightFrame").src = url;
}
</script>
</head>
<body>

<div class="sidebar">
    <h2>Flights</h2>

    <a href="https://uk.flightaware.com/live/flight/CFG4292"
       target="_blank"
       class="flight-link"
       onclick="loadFlight(this.href); return false;">
       Kumari (CFG4292)
    </a>

    <a href="https://www.flightaware.com/live/flight/ICE549"
       target="_blank"
       class="flight-link"
       onclick="loadFlight(this.href); return false;">
       Hemanth (ICE549)
    </a>

    <p style="font-size:12px;color:#ccc;margin-top:20px;">
        If the page does not load below, click the link again and it will open in a new tab.
    </p>
</div>

<div class="content">
    <iframe id="flightFrame"
            src="about:blank"
            title="Flight Viewer">
    </iframe>
</div>

</body>
</html>
